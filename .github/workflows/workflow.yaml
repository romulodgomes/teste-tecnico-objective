name: Continuous Integration

on: [pull_request, push]

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 26
      - name: Install dependencies
        run: npm install
      - name: Run API tests
        run: npm run test:api
      - name: Upload API test report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: cypress/reports/api-report.html
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload E2E test report
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: cypress/reports/e2e-report.html